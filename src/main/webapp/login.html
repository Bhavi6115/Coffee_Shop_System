<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop POS - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6B4F3A 0%, #8B6F5C 100%);
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            margin: 1rem;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: #4a3729;
            font-size: 2rem;
        }

        .login-card h2 i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #4a3729;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #8B6F5C;
        }

        .btn-login {
            width: 100%;
            background: #6B4F3A;
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #4a3729;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .demo-note {
            text-align: center;
            margin-top: 1rem;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>☕ Coffee Shop POS</h2>
    <form action="login" method="post">
        <div id="errorMsg" class="error-message"></div>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
    </form>
    <div class="demo-note">Demo: admin / admin123</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const errorMsg = document.getElementById('errorMsg');
    if (error === '1') {
        errorMsg.textContent = 'Invalid username or password.';
        errorMsg.style.display = 'block';
    } else if (error === '2') {
        errorMsg.textContent = 'Database connection error.';
        errorMsg.style.display = 'block';
    }
</script>
</body>
</html>
